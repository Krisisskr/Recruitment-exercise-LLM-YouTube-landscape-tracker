name: Update LLM Tracker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yt-dlp feedparser requests
          echo "=== Installed packages ==="
          pip list | grep -E "yt-dlp|feedparser|requests"

      - name: Check secrets existence
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then echo "❌ Missing CLOUDFLARE_ACCOUNT_ID"; exit 1; fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then echo "❌ Missing CLOUDFLARE_API_TOKEN"; exit 1; fi
          echo "✅ Both secrets are set."
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Run tracker script
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python tracker.py

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --quiet || (git commit -m "Auto-update data" && git push)
